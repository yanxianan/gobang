<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>五子棋 · 浏览器测试客户端</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #f4e8c8 0%, #e8d8a8 50%, #c9a14a 100%);
    min-height: 100vh; padding: 10px; color: #1a1208;
}
.box {
    background: rgba(244, 232, 200, 0.85);
    border: 1px solid #8b6f4e; border-radius: 10px;
    padding: 12px; margin-bottom: 10px;
}
h2 { color: #8b1e1e; font-size: 20px; text-align: center; margin-bottom: 10px; letter-spacing: 4px; }
label { display: block; margin: 6px 0 3px; font-size: 13px; color: #5c4326; }
input, select, button {
    width: 100%; padding: 8px; border: 1px solid #8b6f4e; border-radius: 6px;
    font-size: 14px; background: #f4e8c8;
}
button {
    background: #b23a48; color: #fff; border: none; font-weight: bold;
    cursor: pointer; margin-top: 8px; padding: 10px;
}
button:hover { background: #8b1e1e; }
button:disabled { background: #a89070; }
.row { display: flex; gap: 6px; }
.row > * { flex: 1; }
#log {
    height: 200px; overflow-y: auto; background: #1a0f08; color: #c9a14a;
    font-family: monospace; font-size: 12px; padding: 8px; border-radius: 6px;
    margin-top: 6px;
}
#log .me { color: #7bb870; }
#log .err { color: #ff6b6b; }
#log .sys { color: #c9a14a; }
.board {
    display: grid; grid-template-columns: repeat(15, 1fr);
    aspect-ratio: 1; background: #e8c887; border: 2px solid #4a2c0f;
    margin: 10px 0; gap: 0;
}
.cell {
    border-right: 1px solid #4a2c0f; border-bottom: 1px solid #4a2c0f;
    position: relative; cursor: pointer;
}
.cell:nth-child(15n) { border-right: none; }
.cell:nth-child(n+211) { border-bottom: none; }
.cell.black::after {
    content: ''; position: absolute; inset: 8%;
    background: radial-gradient(circle at 30% 30%, #555 0%, #000 80%);
    border-radius: 50%;
}
.cell.white::after {
    content: ''; position: absolute; inset: 8%;
    background: radial-gradient(circle at 30% 30%, #fff 0%, #ddd 80%);
    border-radius: 50%; box-shadow: inset 0 0 3px #888;
}
.cell.last::after { box-shadow: 0 0 0 2px red, inset 0 0 3px #888; }
.cell.last.black::after { box-shadow: 0 0 0 2px red; }
.cell.win { background: rgba(255,0,0,0.2); }
.status { font-weight: bold; color: #8b1e1e; padding: 6px 0; text-align: center; }
.btn-group { display: flex; gap: 6px; margin-top: 6px; }
.btn-group button { margin-top: 0; flex: 1; }
.btn-outline { background: transparent; color: #b23a48; border: 2px solid #b23a48; }
</style>
</head>
<body>

<h2>五 子 棋 · 浏 览 器 测 试</h2>

<div class="box">
    <label>服务器地址 (WebSocket)</label>
    <input id="serverUrl" value="ws://35.212.227.58:8080/ws" />
    <div class="row">
        <input id="nickname" placeholder="昵称" value="浏览器玩家" />
        <input id="roomId" placeholder="房间号" value="" maxlength="4" style="max-width:120px" />
    </div>
    <div class="btn-group">
        <button id="btnConnect">连接</button>
    </div>
    <div class="btn-group">
        <button id="btnCreate">创建房间</button>
        <button id="btnJoin" class="btn-outline">加入房间</button>
    </div>
    <div class="row" style="margin-top:6px">
        <button id="btnUndo" class="btn-outline">悔棋</button>
        <button id="btnDraw" class="btn-outline">求和</button>
        <button id="btnResign" class="btn-outline">认输</button>
    </div>
    <div class="status" id="status">未连接</div>
</div>

<div class="box">
    <div id="board" class="board"></div>
</div>

<div class="box">
    <label>聊天</label>
    <div class="row">
        <input id="chatInput" placeholder="说点什么…" />
        <button id="btnChat" style="max-width:80px">发送</button>
    </div>
</div>

<div class="box">
    <label>日志</label>
    <div id="log"></div>
</div>

<script>
const log = (msg, cls='') => {
    const el = document.getElementById('log');
    const t = new Date().toLocaleTimeString();
    el.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
    el.scrollTop = el.scrollHeight;
};

let ws = null;
let mySeat = 0;
let turn = 1;
let status = 'waiting';
let winner = 0;
let timeLimit = 0;
let blackTime = 0, whiteTime = 0;
let cells = Array(15).fill(0).map(() => Array(15).fill(0));
let lastMove = null;
let gameStartTime = 0;
let clockTimer = null;

const boardEl = document.getElementById('board');
for (let y = 0; y < 15; y++) {
    for (let x = 0; x < 15; x++) {
        const c = document.createElement('div');
        c.className = 'cell';
        c.dataset.x = x; c.dataset.y = y;
        c.onclick = () => onCellClick(x, y);
        boardEl.appendChild(c);
    }
}

function renderBoard() {
    const cellEls = boardEl.children;
    for (let y = 0; y < 15; y++) {
        for (let x = 0; x < 15; x++) {
            const el = cellEls[y * 15 + x];
            el.className = 'cell';
            if (cells[y][x] === 1) el.classList.add('black');
            else if (cells[y][x] === 2) el.classList.add('white');
            if (lastMove && lastMove.x === x && lastMove.y === y) el.classList.add('last');
        }
    }
}

function updateStatus() {
    const s = document.getElementById('status');
    if (status === 'waiting') s.textContent = '等待对手加入…';
    else if (status === 'playing') s.textContent = (turn === mySeat) ? '★ 轮到你走' : '等待对手…';
    else if (status === 'finished') s.textContent = '对局结束';
    else s.textContent = status;
}

function startClock() {
    if (clockTimer) clearInterval(clockTimer);
    if (timeLimit <= 0) return;
    clockTimer = setInterval(() => {
        // server推送 clock事件, 这里只是兜底
    }, 1000);
}

document.getElementById('btnConnect').onclick = () => {
    const url = document.getElementById('serverUrl').value.trim();
    if (ws) { ws.close(); ws = null; }
    log('连接中: ' + url);
    ws = new WebSocket(url);
    ws.onopen = () => { log('✓ 已连接', 'me'); };
    ws.onclose = () => { log('连接断开'); };
    ws.onerror = (e) => { log('连接错误', 'err'); };
    ws.onmessage = (e) => {
        try {
            const env = JSON.parse(e.data);
            handle(env.type, env.payload);
        } catch (err) { log('解析失败: ' + e.data, 'err'); }
    };
};

function send(type, payload=null) {
    if (!ws || ws.readyState !== 1) { log('未连接', 'err'); return; }
    ws.send(JSON.stringify({ type, payload }));
}

function handle(type, p) {
    log('← ' + type + (p ? ' ' + JSON.stringify(p) : ''));
    switch (type) {
        case 'room_created':
            mySeat = p.seat;
            document.getElementById('roomId').value = p.room_id;
            log('房间创建: ' + p.room_id + ' (你是' + (mySeat===1?'黑':'白') + ')', 'me');
            break;
        case 'room_joined':
            mySeat = p.seat;
            log('加入房间: ' + p.room_id + ' (你是' + (mySeat===1?'黑':'白') + ')', 'me');
            break;
        case 'room_state':
            status = p.status; turn = p.turn; winner = p.winner;
            cells = p.board; timeLimit = p.time_limit;
            blackTime = p.black_time; whiteTime = p.white_time;
            if (p.moves && p.moves.length) lastMove = p.moves[p.moves.length-1];
            renderBoard(); updateStatus(); startClock();
            break;
        case 'game_start':
            status = 'playing'; turn = p.first_seat;
            gameStartTime = Date.now();
            log('游戏开始! ' + (turn===mySeat?'你先手':'对手先手'), 'sys');
            renderBoard(); updateStatus();
            break;
        case 'move':
            cells[p.y][p.x] = p.seat || turn;
            turn = turn === 1 ? 2 : 1;
            lastMove = { x: p.x, y: p.y };
            renderBoard(); updateStatus();
            break;
        case 'undo_request':
            if (confirm('对方请求悔棋, 是否同意?')) send('undo_response', { accept: true });
            else send('undo_response', { accept: false });
            break;
        case 'undo_response':
            log(p.accept ? '对方同意悔棋' : '对方拒绝悔棋', 'sys');
            break;
        case 'draw_offer':
            if (confirm('对方提议和棋, 是否同意?')) send('draw_response', { accept: true });
            else send('draw_response', { accept: false });
            break;
        case 'game_over':
            winner = p.winner;
            status = 'finished';
            let msg = '';
            if (p.reason === 'draw') msg = '和棋!';
            else if (p.winner === mySeat) msg = '★ 你赢了! (' + p.reason + ')';
            else msg = '你输了 (' + p.reason + ')';
            log(msg, 'sys');
            alert(msg);
            updateStatus();
            break;
        case 'opponent_left':
            log('对手已离开', 'sys');
            alert('对手已离开');
            break;
        case 'chat':
            log('[' + p.name + ']: ' + p.text, 'me');
            break;
        case 'emoji':
            log('[' + p.name + ']: ' + p.emoji, 'me');
            break;
        case 'error':
            log('错误: ' + p.message, 'err');
            alert(p.message);
            break;
        case 'clock':
            blackTime = p.black_time; whiteTime = p.white_time; turn = p.turn;
            break;
    }
}

function onCellClick(x, y) {
    if (status !== 'playing') { log('游戏未开始', 'err'); return; }
    if (turn !== mySeat) { log('不是你的回合', 'err'); return; }
    if (cells[y][x] !== 0) { log('该位置已有棋子', 'err'); return; }
    send('move', { x, y });
}

document.getElementById('btnCreate').onclick = () => {
    const nick = document.getElementById('nickname').value.trim() || '浏览器玩家';
    send('create_room', { nickname: nick, time_limit: 0 });
};
document.getElementById('btnJoin').onclick = () => {
    const nick = document.getElementById('nickname').value.trim() || '浏览器玩家';
    const id = document.getElementById('roomId').value.trim();
    if (!id) { alert('请输入房间号'); return; }
    send('join_room', { room_id: id, nickname: nick });
};
document.getElementById('btnUndo').onclick = () => send('undo_request');
document.getElementById('btnDraw').onclick = () => send('draw_offer');
document.getElementById('btnResign').onclick = () => {
    if (confirm('确认认输?')) send('resign');
};
document.getElementById('btnChat').onclick = () => {
    const t = document.getElementById('chatInput').value.trim();
    if (t) { send('chat', { text: t }); document.getElementById('chatInput').value = ''; }
};
document.getElementById('chatInput').onkeypress = (e) => {
    if (e.key === 'Enter') document.getElementById('btnChat').click();
};
</script>
</body>
</html>
